name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      # Renders through the real pdfmake. Guards against pdfmake API drift,
      # which fails silently rather than throwing.
      - name: Render example PDF
        run: |
          rm -f example.pdf
          bun run example
          test -s example.pdf
          head -c 5 example.pdf | grep -q '%PDF-'
